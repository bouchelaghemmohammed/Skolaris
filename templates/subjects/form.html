{% extends "base.html" %}
{% block title %}{{ action }} une matière – Skolaris{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('matieres') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0"><i class="bi bi-book-fill me-2"></i>{{ action }} une matière</h2>
</div>

<div class="card border-0 shadow-sm" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Nom de la matière *</label>
          <input type="text" name="nom" class="form-control"
                 value="{{ matiere.nom if matiere else '' }}"
                 placeholder="Ex : Mathématiques" required>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Coefficient *</label>
          <input type="number" step="0.5" min="0.5" name="coefficient" class="form-control"
                 value="{{ matiere.coefficient if matiere else '1.0' }}" required>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Enseignant responsable</label>
          <select name="enseignant_id" class="form-select">
            <option value="">— Aucun —</option>
            {% for e in enseignants %}
            <option value="{{ e.id }}"
              {% if matiere and matiere.enseignant_id == e.id %}selected{% endif %}>
              {{ e.prenom }} {{ e.nom }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-info text-white">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{{ url_for('matieres') }}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
