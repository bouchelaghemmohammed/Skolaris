{% extends "base.html" %}
{% block title %}{{ action }} une note – Skolaris{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('notes') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0"><i class="bi bi-clipboard2-data-fill me-2"></i>{{ action }} une note</h2>
</div>

<div class="card border-0 shadow-sm" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Élève *</label>
          <select name="eleve_id" class="form-select" required>
            <option value="">— Sélectionner —</option>
            {% for e in eleves %}
            <option value="{{ e.id }}"
              {% if note and note.eleve_id == e.id %}selected{% endif %}>
              {{ e.nom }} {{ e.prenom }} ({{ e.matricule }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Matière *</label>
          <select name="matiere_id" class="form-select" required>
            <option value="">— Sélectionner —</option>
            {% for m in matieres %}
            <option value="{{ m.id }}"
              {% if note and note.matiere_id == m.id %}selected{% endif %}>
              {{ m.nom }} (coeff. {{ m.coefficient }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Note / 20 *</label>
          <input type="number" step="0.25" min="0" max="20" name="valeur" class="form-control"
                 value="{{ note.valeur if note else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Trimestre *</label>
          <select name="trimestre" class="form-select" required>
            <option value="1" {% if not note or note.trimestre == 1 %}selected{% endif %}>1er trimestre</option>
            <option value="2" {% if note and note.trimestre == 2 %}selected{% endif %}>2ème trimestre</option>
            <option value="3" {% if note and note.trimestre == 3 %}selected{% endif %}>3ème trimestre</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Année scolaire *</label>
          <input type="text" name="annee_scolaire" class="form-control"
                 value="{{ note.annee_scolaire if note else '2025-2026' }}"
                 placeholder="2025-2026" required>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-secondary">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{{ url_for('notes') }}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
